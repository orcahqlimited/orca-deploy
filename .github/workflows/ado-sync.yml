name: ADO sync

# Bidirectional sync between this repo's PRs and Azure DevOps work items.
# Triggers:
#   - PR opened / updated   → comment on the linked work item with PR link, set state to Active
#   - PR merged             → transition work item to Resolved (Founder closes manually after sprint review)
#   - PR closed without merge → comment "PR closed without merge", revert state to New
#
# PR title MUST contain `AB#<nnn>` to be picked up. If absent, the workflow logs a warning
# and exits 0 (does not block PR — the title-format check is a separate CI step).
#
# Secrets required at the ORG level (orcahqlimited):
#   ADO_PAT — Personal Access Token with `Work Items: Read & Write` scope.
#             Created by the Founder once at https://dev.azure.com/orcahq/_usersSettings/tokens
#             and stored at https://github.com/organizations/orcahqlimited/settings/secrets/actions
#
# Reference: https://learn.microsoft.com/en-us/rest/api/azure/devops/wit/work-items

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Extract AB# work-item id(s) from PR title
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # A PR can legitimately reference multiple work items
          # (e.g. parent Bug + parent Story + a child Task). Capture them all.
          IDS=$(echo "$PR_TITLE" | grep -oE 'AB#[0-9]+' | sed 's/AB#//' | sort -u | tr '\n' ' ')
          IDS=$(echo "$IDS" | sed 's/ *$//')
          if [ -n "$IDS" ]; then
            echo "ids=$IDS" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found work-item IDs: $IDS"
          else
            echo "::warning ::PR title missing 'AB#<nnn>' — ADO sync skipped. Add the work-item reference to enable auto-link."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment + transition work item(s)
        if: steps.extract.outputs.found == 'true'
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          IDS: ${{ steps.extract.outputs.ids }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          if [ -z "${ADO_PAT}" ]; then
            echo "::warning ::ADO_PAT org secret not set — sync skipped. Founder one-time setup at https://github.com/organizations/orcahqlimited/settings/secrets/actions"
            exit 0
          fi
          ORG="orcahq"
          PROJECT="ORCA-BUILD"
          AUTH=$(printf ':%s' "$ADO_PAT" | base64 -w 0)

          api_patch() {
            local wi="$1"
            local payload="$2"
            curl -sS -o /dev/null -w '%{http_code}' -X PATCH \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json-patch+json" \
              --data-binary "$payload" \
              "https://dev.azure.com/$ORG/$PROJECT/_apis/wit/workitems/$wi?api-version=7.1"
          }

          api_get() {
            curl -sS \
              -H "Authorization: Basic $AUTH" \
              "https://dev.azure.com/$ORG/$PROJECT/_apis/wit/workitems/$1?\$expand=relations&api-version=7.1"
          }

          # Determine target state from PR action.
          # ADO Agile state machine forbids Active→New, so close-without-merge
          # leaves the state alone and just records the close as a hyperlink.
          STATE_PATCH=true
          STATE=""
          if [[ "$ACTION" == "closed" && "$MERGED" == "true" ]]; then
            STATE="Resolved"
            COMMENT="PR merged: $PR_TITLE — $PR_URL"
          elif [[ "$ACTION" == "closed" && "$MERGED" == "false" ]]; then
            STATE_PATCH=false
            COMMENT="PR closed WITHOUT merge: $PR_TITLE — $PR_URL (state unchanged; Founder decides at sprint review)"
          elif [[ "$ACTION" == "reopened" ]]; then
            STATE="Active"
            COMMENT="PR reopened: $PR_TITLE — $PR_URL"
          else
            STATE="Active"
            COMMENT="PR open: $PR_TITLE — $PR_URL ($REPO#$PR_NUM)"
          fi

          # Idempotent per-id patch. Skip the state op if work item is already
          # in target state. Skip the hyperlink op if a Hyperlink with the
          # same URL already exists. ADO returns 400 on either no-op state
          # transition or duplicate Hyperlink in some Agile process versions.
          for WI in $IDS; do
            echo "::group::AB#$WI"
            ITEM=$(api_get "$WI")
            if [ -z "$ITEM" ] || ! echo "$ITEM" | jq -e .id >/dev/null 2>&1; then
              echo "::warning ::AB#$WI fetch failed — skipping."
              echo "::endgroup::"
              continue
            fi
            CURRENT_STATE=$(echo "$ITEM" | jq -r '.fields."System.State"')
            HAS_LINK=$(echo "$ITEM" | jq --arg u "$PR_URL" '[.relations[]? | select(.rel=="Hyperlink" and .url==$u)] | length')
            ADD_STATE_OP="false"
            ADD_LINK_OP="false"
            if [ "$STATE_PATCH" = "true" ] && [ "$CURRENT_STATE" != "$STATE" ]; then
              ADD_STATE_OP="true"
            fi
            if [ "$HAS_LINK" = "0" ]; then
              ADD_LINK_OP="true"
            fi
            if [ "$ADD_STATE_OP" = "false" ] && [ "$ADD_LINK_OP" = "false" ]; then
              echo "AB#$WI: nothing to do (state=$CURRENT_STATE already=$STATE, link already present)."
              echo "::endgroup::"
              continue
            fi
            PATCH=$(jq -nc \
              --arg state "$STATE" \
              --arg url "$PR_URL" \
              --arg comment "$COMMENT" \
              --argjson add_state "$ADD_STATE_OP" \
              --argjson add_link "$ADD_LINK_OP" \
              '
                ($add_state | if . then [{op:"add", path:"/fields/System.State", value:$state}] else [] end) +
                ($add_link  | if . then [{op:"add", path:"/relations/-", value:{rel:"Hyperlink", url:$url, attributes:{comment:$comment}}}] else [] end)
              ')
            echo "AB#$WI: state=$CURRENT_STATE -> $([ "$ADD_STATE_OP" = "true" ] && echo "$STATE" || echo "$CURRENT_STATE"); link=$([ "$ADD_LINK_OP" = "true" ] && echo "add" || echo "skip")"
            HTTP_CODE=$(api_patch "$WI" "$PATCH")
            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "AB#$WI: ok ($HTTP_CODE)"
            else
              echo "::warning ::AB#$WI: PATCH returned $HTTP_CODE"
            fi
            echo "::endgroup::"
          done
          # Per-item failures are warnings, not workflow blockers — the PR
          # itself is independently reviewable. Hard exit only on global
          # config / auth issues (caught above).
          exit 0
